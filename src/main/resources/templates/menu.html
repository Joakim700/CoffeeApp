<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{layout :: layout(~{::section})}">

    <section class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">☕ Our Coffee Menu</h1>
            <p class="text-gray-600">Freshly roasted and prepared just for you.</p>
        </div>

        <div class="grid gap-6 md:grid-cols-2">
            <div th:each="coffee : ${showMenu}"
                 class="bg-white p-6 rounded-2xl shadow-sm border border-gray-10 shadow-orange-50/50 flex justify-between items-center hover:shadow-md transition-shadow">

                <div class="details">
                    <h3 class="text-xl font-bold text-gray-800" th:text="${coffee.coffeeName}">Coffee Name</h3>
                    <p class="text-sm text-gray-500 mt-1">
                        Milk option: <span class="font-medium text-orange-700" th:text="${coffee.milkType}">Standard</span>
                    </p>
                </div>

                <div class="text-lg font-bold text-gray-900 bg-orange-50 px-4 py-2 rounded-lg"
                     th:text="${#numbers.formatCurrency(coffee.coffeePrice)}">
                    $0.00
                </div>
            </div>
        </div>

        <div class="mt-16 text-center">
            <a href="/" class="inline-block bg-orange-600 text-white px-10 py-4 rounded-full font-bold text-lg hover:bg-orange-700 hover:-translate-y-1 transition-all shadow-lg shadow-orange-200">
                Place Your Order
            </a>
        </div>
    </section>

</div>
</html>
