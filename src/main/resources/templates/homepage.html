<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee MAKE</title>
    <link rel="stylesheet" href="styles.css">
</head>

<style>
    .hero-section {
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        /*url() no-repeat center center/cover;*/
        display: flex;

        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
    }

    .hero-content h2 {
        font-size: 3rem;
        margin-bottom: 10px;
    }
</style>

<body>

<header>
    <nav>
        <h1>Coffee MAKE</h1>
        <ul>
            <li><a href="#menu">Show Menu</a></li>
            <li><a href="#order" class="order-btn">Place Order</a></li>
        </ul>
    </nav>
</header>

<main class="hero-section">
    <div class="hero-content">
        <h2>Brewed to Perfection.</h2>
        <p>Experience the finest beans, roasted with passion.</p>
        <button class="cta-secondary">Explore Our Roasts</button>
    </div>
</main>

<footer>
    <p>&copy; 2026 Coffee MAKE. All rights reserved.</p>
    <div class="socials">
        <a href="#">Instagram</a> | <a href="#">Twitter</a>
    </div>
</footer>

</html>
